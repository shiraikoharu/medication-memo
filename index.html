<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服薬メモ</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#7fa38a">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    :root {
      --bg: #fff7ef;
      --card: #fffdf9;
      --text: #4a3b35;
      --muted: #8a786d;
      --line: #edded2;
      --accent: #8fbfa5;
      --accent-dark: #6f9f84;
      --accent-soft: #eef8f1;
      --pink: #f4d9d6;
      --pink-soft: #fff1f0;
      --tea: #f7eadc;
      --warn: #b86b73;
      --warn-bg: #fff1f2;
      --shadow: 0 10px 28px rgba(122, 86, 61, 0.09);
      --radius: 20px;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #fff8f1 0%, #fffaf5 54%, #f8efe7 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 17px;
      line-height: 1.7;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    input,
    select,
    textarea {
      box-sizing: border-box;
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffefa;
      color: var(--text);
      font-size: 16px;
      padding: 12px 13px;
      outline: none;
    }

    input[type="date"],
    input[type="time"] {
      -webkit-appearance: none;
      appearance: none;
      box-sizing: border-box;
      display: block;
      width: calc(100% - 2px);
      max-width: calc(100% - 2px);
      min-width: 0;
      font-size: 16px;
      line-height: 1.4;
      min-height: 58px;
      height: 58px;
      padding: 14px 16px;
      border-radius: 16px;
      overflow: hidden;
      text-align: left;
    }

    input[type="date"]::-webkit-date-and-time-value,
    input[type="time"]::-webkit-date-and-time-value {
      text-align: left;
      width: 100%;
      min-width: 0;
      line-height: 1.4;
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      max-width: 24px;
      margin-left: 4px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(120, 155, 132, 0.18);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    #symptomInput {
      margin-top: 0;
    }

    button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      min-height: 44px;
      padding: 11px 18px;
      color: var(--text);
      background: #f3eadc;
      transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      background: #ebe0cf;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 14px 48px;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    .header {
      padding: 8px 2px 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 8vw, 3.1rem);
      line-height: 1.2;
      letter-spacing: 0;
      text-align: center;
    }

    .lead {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 1.06rem;
      text-align: center;
    }

    .note {
      margin: 12px 0 0;
      padding: 8px 10px;
      border: 1px solid rgba(237, 222, 210, 0.7);
      border-radius: 14px;
      background: rgba(255, 253, 249, 0.58);
      color: #9a897e;
      font-size: 0.78rem;
      line-height: 1.55;
    }

    .main-action {
      width: 100%;
      margin: 10px 0 18px;
      min-height: 62px;
      background: linear-gradient(135deg, var(--accent) 0%, #9ecbb3 100%);
      color: #fff;
      font-size: 1.16rem;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .main-action:hover {
      background: var(--accent-dark);
    }

    .panel,
    .record-card,
    .backup {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid rgba(237, 222, 210, 0.82);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      display: none;
      margin: 0 0 18px;
      padding: 18px;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    .panel,
    .form-card,
    .record-card,
    .card,
    .backup,
    .backup-area,
    details,
    .later-times,
    .time-extra,
    .field,
    .form-section,
    .form-grid,
    .input-group,
    .input-wrap,
    .time-row,
    summary,
    .symptom-chip-area,
    .symptom-area,
    .backup-actions {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .form-card,
    .card {
      overflow: hidden;
    }

    .input-wrap {
      overflow: hidden;
      padding-right: 2px;
    }

    .input-wrap input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .date-input,
    .time-input,
    .input-wrap input[type="date"],
    .input-wrap input[type="time"] {
      width: calc(100% - 2px);
      max-width: calc(100% - 2px);
      min-height: 58px;
      height: 58px;
    }

    .panel.open {
      display: block;
    }

    .panel h2,
    .section-title {
      margin: 0 0 14px;
      font-size: 1.25rem;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .form-grid {
      display: grid;
      gap: 14px;
      max-width: 100%;
      min-width: 0;
    }

    .field {
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .field label,
    .field-title {
      display: block;
      margin: 0 0 7px;
      font-weight: 700;
      color: #4d4439;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .category-buttons {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .category-button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid #ead9ca;
      border-radius: 18px;
      background: rgba(255, 253, 249, 0.92);
      text-align: center;
      font-weight: 800;
      min-height: 50px;
      box-shadow: none;
    }

    .category-btn {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .category-button:hover {
      background: #fff8f1;
    }


    .category-button.selected {
      border-color: rgba(143, 191, 165, 0.85);
      background: var(--accent-soft);
      color: #355640;
      box-shadow: inset 0 0 0 1px rgba(143, 191, 165, 0.25);
    }

    .time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .time-row input,
    .time-row button {
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .quick-button {
      white-space: nowrap;
      background: #eaf0e8;
      color: #3c6049;
      font-weight: 700;
      min-width: 0;
    }

    .quick-button:hover {
      background: #dde9df;
    }

    .later-times {
      border: 1px solid rgba(234, 223, 206, 0.95);
      border-radius: 15px;
      background: rgba(255, 253, 249, 0.72);
      padding: 0;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    .later-times summary {
      cursor: pointer;
      min-height: 48px;
      padding: 10px 13px;
      color: var(--muted);
      font-weight: 700;
      list-style-position: inside;
    }

    .later-times summary:hover {
      color: var(--text);
    }

    .later-times-body {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 0 13px 13px;
      max-width: 100%;
      min-width: 0;
    }

    .later-times-body .symptom-chip-area {
      grid-column: 1 / -1;
    }

    .symptom-chip-area {
      display: grid;
      gap: 7px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .chip-title {
      margin: 0;
      color: var(--muted);
      font-size: 0.93rem;
      font-weight: 700;
    }

    .symptom-chips {
      display: grid;
      gap: 8px;
      max-width: 100%;
      min-width: 0;
    }

    .symptom-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 100%;
      min-width: 0;
    }

    .symptom-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 100%;
      min-width: 0;
    }

    .symptom-chip {
      max-width: 100%;
      white-space: nowrap;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid #e3d8c6;
      background: var(--tea);
      color: #5f5346;
      font-size: 0.93rem;
      font-weight: 700;
    }

    .symptom-chip:hover {
      background: #f1dfcc;
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: -4px;
    }

    .save-button {
      min-width: 150px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .save-button:hover {
      background: var(--accent-dark);
    }

    .cancel-button {
      background: #f1e6d7;
    }

    .message {
      min-height: 0;
      margin: 0;
      color: var(--warn);
      font-weight: 700;
    }

    .records-section {
      margin-top: 20px;
    }

    .empty {
      margin: 0;
      padding: 18px;
      color: var(--muted);
      background: rgba(255, 253, 248, 0.62);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .record-list {
      display: grid;
      gap: 14px;
    }

    .past-filter-area {
      margin: 0 0 16px;
      padding: 12px;
      border: 1px solid rgba(237, 222, 210, 0.8);
      border-radius: 18px;
      background: rgba(255, 253, 249, 0.68);
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .past-filter-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .past-filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 100%;
      min-width: 0;
    }

    .past-filter-button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid #ead9ca;
      border-radius: 999px;
      background: rgba(255, 253, 249, 0.96);
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      white-space: nowrap;
      max-width: 100%;
    }

    .past-filter-button.selected {
      border-color: rgba(143, 191, 165, 0.85);
      background: var(--accent-soft);
      color: #355640;
      box-shadow: inset 0 0 0 1px rgba(143, 191, 165, 0.25);
    }

    .date-group {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }


    .record-card {
      padding: 17px;
    }

    .record-top {
      margin-bottom: 12px;
    }

    .record-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .date-text {
      margin: 0;
      color: var(--text);
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .category-name {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      margin: 0;
      padding: 5px 12px;
      border: 1px solid rgba(143, 191, 165, 0.45);
      border-radius: 999px;
      background: linear-gradient(180deg, #eef8f1 0%, #f8fff9 100%);
      color: #41644d;
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: 0;
      box-shadow: 0 3px 10px rgba(143, 191, 165, 0.12);
    }

    .category-name::before {
      content: "";
      display: inline-block;
      width: 9px;
      height: 16px;
      margin-right: 7px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f4d9d6 0 50%, #8fbfa5 50% 100%);
      box-shadow: 0 1px 3px rgba(122, 86, 61, 0.12);
      flex: 0 0 auto;
    }

    .medicine-memo {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin: 0 0 10px;
    }

    .detail {
      min-width: 0;
      min-height: 54px;
      padding: 7px 9px;
      border-radius: 12px;
      background: #fbf6ed;
      line-height: 1.32;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .detail-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .detail-value {
      font-weight: 700;
      font-size: 0.96rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .symptom-box {
      margin: 0 0 11px;
      padding: 10px 11px;
      border-radius: 13px;
      background: #fbf6ed;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .symptom-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .followup-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 0 0 12px;
    }

    .followup-actions .followup-button:only-child {
      grid-column: 1 / -1;
    }

    .followup-button {
      background: #edf3e9;
      color: #496c54;
      border: 1px solid #d8e5d7;
      font-weight: 700;
    }

    .followup-button:hover {
      background: #e1ecd9;
    }

    .record-symptom-details {
      margin: 0 0 11px;
      border: 1px solid rgba(234, 223, 206, 0.9);
      border-radius: 14px;
      background: rgba(255, 253, 249, 0.72);
      box-shadow: none;
      overflow: hidden;
    }

    .record-symptom-details summary {
      cursor: pointer;
      min-height: 42px;
      padding: 9px 12px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      list-style-position: inside;
    }

    .record-symptom-area {
      padding: 0 12px 12px;
    }

    .edit-button {
      background: #eaf0e8;
      color: #3c6049;
      font-weight: 700;
    }

    .delete-button {
      background: var(--warn-bg);
      color: var(--warn);
      font-weight: 700;
    }

    .delete-button:hover {
      background: #ffe3df;
    }

    .backup {
      margin-top: 34px;
      padding: 14px;
      box-shadow: none;
      background: rgba(255, 253, 249, 0.72);
    }

    .backup summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.94rem;
    }

    .backup-body {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .backup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      max-width: 100%;
      min-width: 0;
    }

    .small-button {
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      background: #f3eadc;
      color: var(--muted);
    }

    .file-input {
      font-size: 0.9rem;
      padding: 9px;
      background: #fffefa;
      max-width: 100%;
      min-width: 0;
    }

    .backup-message {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.4em;
    }

    .error {
      color: var(--warn);
      font-weight: 700;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      body {
        font-size: 16px;
      }

      .app {
        padding: 22px 12px 48px;
      }

      .panel,
      .record-card {
        border-radius: 16px;
        padding: 15px;
      }
    }

    @media (max-width: 520px) {
      .app {
        width: 100%;
        max-width: 100%;
        padding-left: 10px;
        padding-right: 10px;
      }

      .time-row {
        grid-template-columns: 1fr;
      }

      .time-row input,
      .time-row button {
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }

      .panel,
      .form-card,
      .record-card,
      .card {
        padding-left: 12px;
        padding-right: 12px;
      }

      .quick-button {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .form-actions button,
      .card-actions button,
      .followup-actions button {
        flex: 1 1 120px;
      }

      .detail-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 360px) {
      .category-grid,
      .category-buttons,
      .later-times-body {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>服薬メモ</h1>
      <p class="lead">効果を確認したい薬だけ記録できます。</p>
      <p class="note">※このアプリは記録用です。服薬内容の変更は主治医・薬剤師に相談してください。</p>
    </header>

    <button class="main-action" id="openFormButton" type="button">＋ 服薬を記録する</button>

    <section class="panel form-card" id="formPanel" aria-live="polite">
      <h2 id="formTitle">服薬を記録する</h2>
      <form id="recordForm">
        <input type="hidden" id="editingId">

        <div class="form-grid">
          <div class="field">
            <label for="dateInput">日付</label>
            <div class="input-wrap">
              <input class="date-input" type="date" id="dateInput" required>
            </div>
          </div>

          <div class="field">
            <span class="field-title">薬の種類</span>
            <div class="category-grid category-buttons" id="categoryButtons"></div>
            <input type="hidden" id="categoryInput">
          </div>

          <div class="field">
            <label for="medicineMemoInput">薬名・量などの記入（任意）</label>
            <input type="text" id="medicineMemoInput">
          </div>

          <div class="field">
            <label for="takenTimeInput">飲んだ時間</label>
            <div class="time-row">
              <div class="input-wrap">
                <input class="time-input" type="time" id="takenTimeInput">
              </div>
            </div>
          </div>

          <div class="field">
            <label for="symptomInput">メモ</label>
            <textarea id="symptomInput"></textarea>
          </div>

          <details class="later-times" id="laterTimesDetails">
            <summary>あとで入力する項目</summary>
            <div class="later-times-body">
              <div class="field">
                <label for="workedTimeInput">効いてきた時間</label>
                <div class="time-row">
                  <div class="input-wrap">
                    <input class="time-input" type="time" id="workedTimeInput">
                  </div>
                  <button class="quick-button" type="button" data-now-target="workedTimeInput">効いてきた</button>
                </div>
              </div>

              <div class="field">
                <label for="woreOffTimeInput">効果が切れてきた時間</label>
                <div class="time-row">
                  <div class="input-wrap">
                    <input class="time-input" type="time" id="woreOffTimeInput">
                  </div>
                  <button class="quick-button" type="button" data-now-target="woreOffTimeInput">切れてきた</button>
                </div>
              </div>

              <div class="symptom-chip-area" aria-label="よくある症状">
                <div class="symptom-chips" id="symptomChips"></div>
              </div>
            </div>
          </details>

          <p class="message" id="formMessage" role="alert"></p>

          <div class="form-actions">
            <button class="save-button" type="submit">保存する</button>
            <button class="cancel-button" id="cancelButton" type="button">キャンセル</button>
          </div>
        </div>
      </form>
    </section>

    <section class="records-section" aria-labelledby="todayTitle">
      <h2 class="section-title" id="todayTitle">今日の記録</h2>
      <div class="record-list" id="todayRecords"></div>
    </section>

    <section class="records-section" aria-labelledby="pastTitle">
      <h2 class="section-title" id="pastTitle">過去の記録</h2>
      <div class="past-filter-area" aria-label="過去の記録を薬の種類で絞り込む">
        <p class="past-filter-label">薬の種類で見る</p>
        <div class="past-filter-buttons" id="pastFilterButtons"></div>
      </div>
      <div id="pastRecords"></div>
    </section>

    <details class="backup">
      <summary>バックアップ・復元</summary>
      <div class="backup-body">
        <div class="backup-actions">
          <button class="small-button" id="exportButton" type="button">JSONを書き出す</button>
          <label class="sr-only" for="importInput">JSONファイルを選択</label>
          <input class="file-input" id="importInput" type="file" accept="application/json,.json">
        </div>
        <p class="backup-message" id="backupMessage"></p>
      </div>
    </details>
  </main>

  <script>
    const STORAGE_KEY = "fukuyakuMemoRecords";
    const PAST_FILTER_ALL = "すべて";
    const CATEGORIES = ["抗不安薬", "睡眠薬", "抗うつ薬", "抗精神病薬", "気分安定薬", "頓服", "その他"];
    const COMMON_SYMPTOM_GROUPS = [
      ["眠気", "ぼーっとする", "眠れた", "中途覚醒あり"],
      ["不安が下がった", "落ち着かない"],
      ["だるい", "頭が重い", "吐き気", "動悸", "口が渇く", "ふらつき", "強いふらつき"]
    ];
    const APP_OPEN_DATE = todayString();

    const openFormButton = document.getElementById("openFormButton");
    const formPanel = document.getElementById("formPanel");
    const formTitle = document.getElementById("formTitle");
    const recordForm = document.getElementById("recordForm");
    const editingId = document.getElementById("editingId");
    const dateInput = document.getElementById("dateInput");
    const categoryButtons = document.getElementById("categoryButtons");
    const categoryInput = document.getElementById("categoryInput");
    const medicineMemoInput = document.getElementById("medicineMemoInput");
    const takenTimeInput = document.getElementById("takenTimeInput");
    const workedTimeInput = document.getElementById("workedTimeInput");
    const woreOffTimeInput = document.getElementById("woreOffTimeInput");
    const laterTimesDetails = document.getElementById("laterTimesDetails");
    const symptomInput = document.getElementById("symptomInput");
    const symptomChips = document.getElementById("symptomChips");
    const formMessage = document.getElementById("formMessage");
    const cancelButton = document.getElementById("cancelButton");
    const todayRecords = document.getElementById("todayRecords");
    const pastFilterButtons = document.getElementById("pastFilterButtons");
    const pastRecords = document.getElementById("pastRecords");
    const exportButton = document.getElementById("exportButton");
    const importInput = document.getElementById("importInput");
    const backupMessage = document.getElementById("backupMessage");

    let records = loadRecords();
    let selectedPastCategory = PAST_FILTER_ALL;

    function todayString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function currentTimeString() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function createId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `record-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return [];
        }
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed)
          ? parsed.map(normalizeStoredRecord).filter(Boolean)
          : [];
      } catch (error) {
        return [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function isValidRecordLike(record) {
      return record &&
        typeof record.id === "string" &&
        typeof record.date === "string" &&
        CATEGORIES.includes(record.category) &&
        typeof record.medicineMemo === "string" &&
        typeof record.takenTime === "string" &&
        (typeof record.workedTime === "string" || record.workedTime == null) &&
        (typeof record.woreOffTime === "string" || record.woreOffTime == null) &&
        typeof record.symptom === "string" &&
        typeof record.createdAt === "string" &&
        typeof record.updatedAt === "string";
    }

    function dizzinessToSymptom(value) {
      if (!value || value === "未記録" || value === "なし") {
        return "";
      }
      if (value === "少し") {
        return "ふらつき少し";
      }
      if (value === "あり") {
        return "ふらつき";
      }
      if (value === "強い") {
        return "強いふらつき";
      }
      return `ふらつき${value}`;
    }

    function mergeSymptomText(baseText, addedText) {
      const parts = [];
      [baseText, addedText].forEach((text) => {
        if (!text) {
          return;
        }
        String(text).split("、").forEach((part) => {
          const trimmed = part.trim();
          if (trimmed && !parts.includes(trimmed)) {
            parts.push(trimmed);
          }
        });
      });
      return parts.join("、");
    }

    function normalizeStoredRecord(record) {
      if (!isValidRecordLike(record)) {
        return null;
      }

      const migratedSymptom = mergeSymptomText(record.symptom || "", dizzinessToSymptom(record.dizziness));

      return {
        id: record.id,
        date: record.date,
        category: record.category,
        medicineMemo: record.medicineMemo || "",
        takenTime: record.takenTime || "",
        workedTime: record.workedTime || "",
        woreOffTime: record.woreOffTime || "",
        symptom: migratedSymptom,
        createdAt: record.createdAt,
        updatedAt: record.updatedAt
      };
    }

    function normalizeImportedRecords(value) {
      if (!Array.isArray(value)) {
        throw new Error("JSONの中身が記録の配列ではありません。");
      }

      return value.map((record) => {
        const normalized = {
          id: typeof record.id === "string" && record.id ? record.id : createId(),
          date: typeof record.date === "string" ? record.date : "",
          category: typeof record.category === "string" ? record.category : "",
          medicineMemo: typeof record.medicineMemo === "string" ? record.medicineMemo : "",
          takenTime: typeof record.takenTime === "string" ? record.takenTime : "",
          workedTime: typeof record.workedTime === "string" ? record.workedTime : "",
          woreOffTime: typeof record.woreOffTime === "string" ? record.woreOffTime : "",
          symptom: mergeSymptomText(
            typeof record.symptom === "string" ? record.symptom : "",
            dizzinessToSymptom(record.dizziness)
          ),
          createdAt: typeof record.createdAt === "string" ? record.createdAt : new Date().toISOString(),
          updatedAt: typeof record.updatedAt === "string" ? record.updatedAt : new Date().toISOString()
        };

        if (!normalized.date || !CATEGORIES.includes(normalized.category)) {
          throw new Error("日付または薬の種類が不正な記録があります。");
        }

        return normalized;
      });
    }

    function renderCategoryButtons(selectedCategory = "") {
      categoryButtons.innerHTML = CATEGORIES.map((category) => {
        const selectedClass = category === selectedCategory ? " selected" : "";
        const pressed = category === selectedCategory ? "true" : "false";
        return `<button class="category-button category-btn${selectedClass}" type="button" data-category="${category}" aria-pressed="${pressed}">${category}</button>`;
      }).join("");
    }

    function renderPastFilterButtons() {
      const filterOptions = [PAST_FILTER_ALL, ...CATEGORIES];
      pastFilterButtons.innerHTML = filterOptions.map((category) => {
        const selectedClass = category === selectedPastCategory ? " selected" : "";
        const pressed = category === selectedPastCategory ? "true" : "false";
        return `<button class="past-filter-button${selectedClass}" type="button" data-past-category="${escapeHtml(category)}" aria-pressed="${pressed}">${escapeHtml(category)}</button>`;
      }).join("");
    }

    function renderSymptomChips() {
      symptomChips.innerHTML = COMMON_SYMPTOM_GROUPS.map((group) => {
        const buttons = group.map((symptom) => {
          return `<button class="symptom-chip" type="button" data-symptom="${escapeHtml(symptom)}">${escapeHtml(symptom)}</button>`;
        }).join("");
        return `<div class="symptom-chip-row symptom-buttons">${buttons}</div>`;
      }).join("");
    }

    function renderRecordSymptomChips(recordId) {
      return COMMON_SYMPTOM_GROUPS.map((group) => {
        const buttons = group.map((symptom) => {
          return `<button class="symptom-chip record-symptom-chip" type="button" data-action="add-symptom" data-id="${escapeHtml(recordId)}" data-symptom="${escapeHtml(symptom)}">${escapeHtml(symptom)}</button>`;
        }).join("");
        return `<div class="symptom-chip-row symptom-buttons">${buttons}</div>`;
      }).join("");
    }

    function addSymptomToMemo(symptom) {
      const currentText = symptomInput.value.trim();
      const parts = currentText
        ? currentText.split("、").map((part) => part.trim()).filter(Boolean)
        : [];

      if (!parts.includes(symptom)) {
        parts.push(symptom);
      }

      symptomInput.value = parts.join("、");
      symptomInput.focus();
    }

    function selectCategory(category) {
      categoryInput.value = category;
      renderCategoryButtons(category);
      formMessage.textContent = "";
    }

    function resetForm() {
      editingId.value = "";
      formTitle.textContent = "服薬を記録する";
      dateInput.value = APP_OPEN_DATE;
      categoryInput.value = "";
      medicineMemoInput.value = "";
      takenTimeInput.value = "";
      workedTimeInput.value = "";
      woreOffTimeInput.value = "";
      laterTimesDetails.open = false;
      symptomInput.value = "";
      formMessage.textContent = "";
      renderCategoryButtons("");
    }

    function openForm(mode = "new", record = null) {
      formPanel.classList.add("open");

      if (mode === "edit" && record) {
        editingId.value = record.id;
        formTitle.textContent = "記録を編集する";
        dateInput.value = record.date;
        categoryInput.value = record.category;
        medicineMemoInput.value = record.medicineMemo;
        takenTimeInput.value = record.takenTime;
        workedTimeInput.value = record.workedTime;
        woreOffTimeInput.value = record.woreOffTime;
        laterTimesDetails.open = hasTime(record.workedTime) || hasTime(record.woreOffTime);
        symptomInput.value = record.symptom;
        formMessage.textContent = "";
        renderCategoryButtons(record.category);
      } else {
        resetForm();
      }

      formPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => dateInput.focus(), 150);
    }

    function closeForm() {
      formPanel.classList.remove("open");
      resetForm();
    }

    function formatDate(dateString) {
      if (!dateString) {
        return "日付未記録";
      }
      const parts = dateString.split("-");
      if (parts.length !== 3) {
        return dateString;
      }
      const year = Number(parts[0]);
      const month = Number(parts[1]);
      const day = Number(parts[2]);
      return `${year}年${month}月${day}日`;
    }

    function displayTime(value) {
      return value || "未記録";
    }

    function hasTime(value) {
      return typeof value === "string" && value.trim() !== "";
    }

    function sortedRecords(list) {
      return [...list].sort((a, b) => {
        if (a.date !== b.date) {
          return b.date.localeCompare(a.date);
        }
        const aTime = a.takenTime || "00:00";
        const bTime = b.takenTime || "00:00";
        if (aTime !== bTime) {
          return bTime.localeCompare(aTime);
        }
        return b.updatedAt.localeCompare(a.updatedAt);
      });
    }

    function renderRecordCard(record) {
      const memoHtml = record.medicineMemo.trim()
        ? `<p class="medicine-memo">薬名・量など：${escapeHtml(record.medicineMemo.trim())}</p>`
        : "";
      const symptomHtml = record.symptom.trim()
        ? `<div class="symptom-box"><span class="symptom-label">メモ</span>${escapeHtml(record.symptom.trim())}</div>`
        : "";
      const followupButtons = [];
      if (!hasTime(record.workedTime)) {
        followupButtons.push(`<button class="followup-button" type="button" data-action="mark-worked" data-id="${escapeHtml(record.id)}">効いてきた</button>`);
      }
      if (!hasTime(record.woreOffTime)) {
        followupButtons.push(`<button class="followup-button" type="button" data-action="mark-wore-off" data-id="${escapeHtml(record.id)}">切れてきた</button>`);
      }
      const followupHtml = followupButtons.length
        ? `<div class="followup-actions">${followupButtons.join("")}</div>`
        : "";
      const recordSymptomHtml = `
        <details class="record-symptom-details">
          <summary>服用後の症状を選ぶ</summary>
          <div class="symptom-chip-area record-symptom-area" aria-label="服用後の症状">
            <div class="symptom-chips">${renderRecordSymptomChips(record.id)}</div>
          </div>
        </details>
      `;

      return `
        <article class="record-card card">
          <div class="record-top">
            <div class="record-title-row">
              <p class="date-text">${escapeHtml(formatDate(record.date))}</p>
              <h3 class="category-name" aria-label="薬の種類">${escapeHtml(record.category)}</h3>
            </div>
          </div>
          ${memoHtml}
          <div class="detail-grid">
            <div class="detail">
              <span class="detail-label">飲んだ</span>
              <span class="detail-value">${escapeHtml(displayTime(record.takenTime))}</span>
            </div>
            <div class="detail">
              <span class="detail-label">効いてきた</span>
              <span class="detail-value">${escapeHtml(displayTime(record.workedTime))}</span>
            </div>
            <div class="detail">
              <span class="detail-label">切れてきた</span>
              <span class="detail-value">${escapeHtml(displayTime(record.woreOffTime))}</span>
            </div>
          </div>
          ${followupHtml}
          ${recordSymptomHtml}
          ${symptomHtml}
          <div class="card-actions">
            <button class="edit-button" type="button" data-action="edit" data-id="${escapeHtml(record.id)}">編集</button>
            <button class="delete-button" type="button" data-action="delete" data-id="${escapeHtml(record.id)}">削除</button>
          </div>
        </article>
      `;
    }

    function renderRecords() {
      const today = todayString();
      const todayList = sortedRecords(records.filter((record) => record.date === today));
      const allPastList = sortedRecords(records.filter((record) => record.date !== today));
      const filteredPastList = selectedPastCategory === PAST_FILTER_ALL
        ? allPastList
        : allPastList.filter((record) => record.category === selectedPastCategory);

      todayRecords.innerHTML = todayList.length
        ? todayList.map(renderRecordCard).join("")
        : `<p class="empty">今日の記録はまだありません。</p>`;

      renderPastFilterButtons();

      if (!allPastList.length) {
        pastRecords.innerHTML = `<p class="empty">過去の記録はまだありません。</p>`;
        return;
      }

      if (!filteredPastList.length) {
        pastRecords.innerHTML = `<p class="empty">この薬の過去の記録はまだありません。</p>`;
        return;
      }

      pastRecords.innerHTML = `<div class="record-list">${filteredPastList.map(renderRecordCard).join("")}</div>`;
    }

    function handleSubmit(event) {
      event.preventDefault();

      if (!categoryInput.value) {
        formMessage.textContent = "薬の種類を選んでください";
        return;
      }

      const now = new Date().toISOString();
      const currentId = editingId.value;
      const existingRecord = records.find((record) => record.id === currentId);

      const savedRecord = {
        id: currentId || createId(),
        date: dateInput.value || todayString(),
        category: categoryInput.value,
        medicineMemo: medicineMemoInput.value.trim(),
        takenTime: takenTimeInput.value,
        workedTime: workedTimeInput.value,
        woreOffTime: woreOffTimeInput.value,
        symptom: symptomInput.value.trim(),
        createdAt: existingRecord ? existingRecord.createdAt : now,
        updatedAt: now
      };

      if (currentId) {
        records = records.map((record) => record.id === currentId ? savedRecord : record);
      } else {
        records.push(savedRecord);
      }

      saveRecords();
      renderRecords();
      closeForm();
    }

    function handleRecordAction(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) {
        return;
      }

      const id = button.dataset.id;
      const action = button.dataset.action;
      const record = records.find((item) => item.id === id);

      if (!record) {
        return;
      }

      if (action === "edit") {
        openForm("edit", record);
      }

      if (action === "mark-worked") {
        records = records.map((item) => item.id === id
          ? { ...item, workedTime: currentTimeString(), updatedAt: new Date().toISOString() }
          : item
        );
        saveRecords();
        renderRecords();
      }

      if (action === "mark-wore-off") {
        records = records.map((item) => item.id === id
          ? { ...item, woreOffTime: currentTimeString(), updatedAt: new Date().toISOString() }
          : item
        );
        saveRecords();
        renderRecords();
      }

      if (action === "add-symptom") {
        const symptom = button.dataset.symptom || "";
        records = records.map((item) => item.id === id
          ? { ...item, symptom: mergeSymptomText(item.symptom || "", symptom), updatedAt: new Date().toISOString() }
          : item
        );
        saveRecords();
        renderRecords();
      }

      if (action === "delete") {
        const confirmed = confirm("この記録を削除しますか？");
        if (!confirmed) {
          return;
        }
        records = records.filter((item) => item.id !== id);
        saveRecords();
        renderRecords();
      }
    }

    function exportJson() {
      const data = JSON.stringify(records, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `服薬メモ_backup_${todayString()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      backupMessage.textContent = "JSONを書き出しました。";
      backupMessage.classList.remove("error");
    }

    function importJson(file) {
      if (!file) {
        return;
      }

      const confirmed = confirm("現在の記録を、選択したJSONの内容で置き換えます。実行しますか？");
      if (!confirmed) {
        importInput.value = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          records = normalizeImportedRecords(parsed);
          saveRecords();
          renderRecords();
          closeForm();
          backupMessage.textContent = "JSONから復元しました。";
          backupMessage.classList.remove("error");
        } catch (error) {
          backupMessage.textContent = `復元できませんでした。${error.message}`;
          backupMessage.classList.add("error");
        } finally {
          importInput.value = "";
        }
      };

      reader.onerror = () => {
        backupMessage.textContent = "ファイルを読み込めませんでした。";
        backupMessage.classList.add("error");
        importInput.value = "";
      };

      reader.readAsText(file);
    }

    categoryButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-category]");
      if (button) {
        selectCategory(button.dataset.category);
      }
    });

    symptomChips.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-symptom]");
      if (button) {
        addSymptomToMemo(button.dataset.symptom);
      }
    });

    pastFilterButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-past-category]");
      if (!button) {
        return;
      }
      selectedPastCategory = button.dataset.pastCategory;
      renderRecords();
    });

    document.addEventListener("click", (event) => {
      const nowButton = event.target.closest("button[data-now-target]");
      if (!nowButton) {
        return;
      }
      const target = document.getElementById(nowButton.dataset.nowTarget);
      if (target) {
        target.value = currentTimeString();
      }
    });

    function fillTakenTimeIfEmpty() {
      if (!takenTimeInput.value) {
        takenTimeInput.value = currentTimeString();
      }
    }

    takenTimeInput.addEventListener("focus", fillTakenTimeIfEmpty);
    takenTimeInput.addEventListener("click", fillTakenTimeIfEmpty);

    openFormButton.addEventListener("click", () => openForm("new"));
    cancelButton.addEventListener("click", closeForm);
    recordForm.addEventListener("submit", handleSubmit);
    todayRecords.addEventListener("click", handleRecordAction);
    pastRecords.addEventListener("click", handleRecordAction);
    exportButton.addEventListener("click", exportJson);
    importInput.addEventListener("change", () => importJson(importInput.files[0]));

    renderCategoryButtons("");
    renderPastFilterButtons();
    renderSymptomChips();
    resetForm();
    renderRecords();

    if ("serviceWorker" in navigator) {
      let refreshing = false;

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) {
          return;
        }
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then((registration) => {
            registration.update();
          })
          .catch((error) => {
            console.warn("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
