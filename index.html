<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服薬メモ</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="theme-color" content="#7fa38a">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overscroll-behavior-x: none;
    }

    :root {
      --bg: #fff7ef;
      --card: #fffdf9;
      --text: #4a3b35;
      --muted: #8a786d;
      --line: #edded2;
      --accent: #8fbfa5;
      --accent-dark: #6f9f84;
      --accent-soft: #eef8f1;
      --pink: #f4d9d6;
      --pink-soft: #fff1f0;
      --tea: #f7eadc;
      --warn: #b86b73;
      --warn-bg: #fff1f2;
      --shadow: 0 10px 28px rgba(122, 86, 61, 0.09);
      --radius: 20px;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #fff8f1 0%, #fffaf5 54%, #f8efe7 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 17px;
      line-height: 1.7;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    input,
    select,
    textarea {
      box-sizing: border-box;
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffefa;
      color: var(--text);
      font-size: 16px;
      padding: 12px 13px;
      outline: none;
    }

    input[type="date"],
    input[type="time"] {
      -webkit-appearance: none;
      appearance: none;
      box-sizing: border-box;
      display: block;
      width: calc(100% - 2px);
      max-width: calc(100% - 2px);
      min-width: 0;
      font-size: 16px;
      line-height: 1.4;
      min-height: 58px;
      height: 58px;
      padding: 14px 16px;
      border-radius: 16px;
      overflow: hidden;
      text-align: left;
    }

    input[type="date"]::-webkit-date-and-time-value,
    input[type="time"]::-webkit-date-and-time-value {
      text-align: left;
      width: 100%;
      min-width: 0;
      line-height: 1.4;
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      max-width: 24px;
      margin-left: 4px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(120, 155, 132, 0.18);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    #beforeMemoInput,
    #afterMemoInput {
      margin-top: 0;
    }

    button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      min-height: 44px;
      padding: 11px 18px;
      color: var(--text);
      background: #f3eadc;
      transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      background: #ebe0cf;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 14px 48px;
      box-sizing: border-box;
      overflow-x: hidden;
      touch-action: pan-y;
    }

    .header {
      padding: 8px 2px 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 8vw, 3.1rem);
      line-height: 1.2;
      letter-spacing: 0;
      text-align: center;
    }

    .lead {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 1.06rem;
      text-align: center;
    }

    .note {
      margin: 12px 0 0;
      padding: 8px 10px;
      border: 1px solid rgba(237, 222, 210, 0.7);
      border-radius: 14px;
      background: rgba(255, 253, 249, 0.58);
      color: #9a897e;
      font-size: 0.78rem;
      line-height: 1.55;
    }

    .main-action {
      width: 100%;
      margin: 10px 0 18px;
      min-height: 62px;
      background: linear-gradient(135deg, var(--accent) 0%, #9ecbb3 100%);
      color: #fff;
      font-size: 1.16rem;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .main-action:hover {
      background: var(--accent-dark);
    }

    .panel,
    .record-card {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      margin: 0 0 18px;
      padding: 18px;
      border: 1px solid rgba(237, 222, 210, 0.86);
      border-radius: var(--radius);
      background: rgba(255, 253, 249, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel {
      display: none;
    }

    .panel.open {
      display: block;
    }

    .form-card h2,
    .inline-time-modal-card h2 {
      margin: 0 0 14px;
      font-size: 1.25rem;
      line-height: 1.35;
    }

    .form-grid {
      display: grid;
      gap: 16px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .field {
      display: grid;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    label,
    .field-title {
      color: var(--text);
      font-weight: 700;
      line-height: 1.45;
    }

    .input-wrap {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      overflow: hidden;
    }

    .input-wrap input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .input-wrap input[type="date"],
    .input-wrap input[type="time"] {
      min-height: 58px;
      height: 58px;
    }

    .time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .time-row input,
    .time-row button {
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .category-grid,
    .category-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .category-button,
    .category-btn {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid #ead9ca;
      border-radius: 16px;
      background: rgba(255, 253, 249, 0.94);
      color: var(--text);
      font-weight: 700;
      text-align: center;
    }

    .category-button.selected,
    .category-btn.selected {
      border-color: rgba(143, 191, 165, 0.95);
      background: var(--accent-soft);
      color: #355640;
      box-shadow: inset 0 0 0 1px rgba(143, 191, 165, 0.25);
    }

    .later-times,
    .record-symptom-details {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      padding: 0;
      border: 1px solid rgba(237, 222, 210, 0.78);
      border-radius: 16px;
      background: rgba(255, 253, 249, 0.66);
      overflow: hidden;
    }

    .later-times summary,
    .record-symptom-details summary {
      cursor: pointer;
      padding: 11px 13px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .later-times-body {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      padding: 0 13px 13px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .symptom-chip-area {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .symptom-chips {
      display: grid;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .symptom-chip-row,
    .symptom-buttons,
    .past-filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 100%;
      min-width: 0;
    }

    .symptom-chip {
      max-width: 100%;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid #ead9ca;
      border-radius: 999px;
      background: #fffaf2;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .message {
      margin: 0;
      color: var(--warn);
      font-weight: 700;
      min-height: 1.4em;
    }

    .form-actions,
    .card-actions,
    .inline-time-modal-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      max-width: 100%;
      min-width: 0;
    }

    .save-button,
    .inline-time-save-button {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .cancel-button,
    .inline-time-cancel-button {
      background: #f3eadc;
      color: var(--muted);
      font-weight: 700;
    }

    .records-section {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      margin: 0 0 24px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1.28rem;
      line-height: 1.4;
    }

    .record-list {
      display: grid;
      gap: 14px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .empty {
      margin: 0;
      padding: 14px 16px;
      border: 1px dashed rgba(237, 222, 210, 0.9);
      border-radius: 16px;
      background: rgba(255, 253, 249, 0.7);
      color: var(--muted);
    }

    .record-card {
      display: grid;
      gap: 12px;
      margin-bottom: 0;
    }

    .record-top,
    .record-title-row {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .record-title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .date-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 700;
    }

    .category-name {
      margin: 0;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #355640;
      font-size: 0.92rem;
      line-height: 1.4;
    }

    #medicineAmountInput {
      min-height: 52px;
    }

    .medicine-info {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .medicine-memo {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .detail {
      display: grid;
      gap: 2px;
      min-width: 0;
      padding: 8px 7px;
      border-radius: 14px;
      background: rgba(247, 234, 220, 0.62);
      overflow: hidden;
    }

    .detail-label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      line-height: 1.35;
      white-space: nowrap;
    }

    .detail-value {
      min-width: 0;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .record-time-button {
      width: 100%;
      min-height: 34px;
      padding: 4px 2px;
      border-radius: 10px;
      background: transparent;
      color: #477257;
      text-align: left;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .record-time-button:hover {
      background: rgba(143, 191, 165, 0.12);
    }

    .record-symptom-area {
      padding: 0 13px 13px;
    }

    .form-symptom-description,
    .record-symptom-description {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.5;
    }

    .memo-blocks {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .memo-block,
    .symptom-box {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 248, 240, 0.95);
      color: var(--text);
      font-size: 0.94rem;
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .symptom-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .card-actions {
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .edit-button,
    .delete-button {
      min-width: 84px;
      min-height: 40px;
      padding: 8px 14px;
      font-size: 0.92rem;
    }

    .edit-button {
      background: #eaf0e8;
      color: #3c6049;
      font-weight: 700;
    }

    .delete-button {
      background: var(--warn-bg);
      color: var(--warn);
      font-weight: 700;
    }

    .delete-button:hover {
      background: #ffe3df;
    }

    .past-filter-area {
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid rgba(237, 222, 210, 0.8);
      border-radius: 18px;
      background: rgba(255, 253, 249, 0.68);
      max-width: 100%;
      min-width: 0;
    }

    .past-filter-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .past-filter-button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid #ead9ca;
      border-radius: 999px;
      background: rgba(255, 253, 249, 0.96);
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .past-filter-button.selected {
      border-color: rgba(143, 191, 165, 0.85);
      background: var(--accent-soft);
      color: #355640;
      box-shadow: inset 0 0 0 1px rgba(143, 191, 165, 0.25);
    }

    .backup-card {
      display: grid;
      gap: 10px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      margin: 18px 0 22px;
      padding: 17px 18px 16px;
      border: 1px solid rgba(237, 222, 210, 0.82);
      border-radius: 20px;
      background: rgba(255, 253, 249, 0.9);
      box-shadow: 0 8px 20px rgba(90, 72, 56, 0.05);
      overflow: hidden;
    }

    .backup-title {
      margin: 0;
      color: var(--text);
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .backup-description {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .backup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      max-width: 100%;
      min-width: 0;
      margin-top: 4px;
    }

    .small-button {
      min-width: 88px;
      min-height: 40px;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 0.92rem;
      background: var(--accent-soft);
      color: #355640;
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(143, 191, 165, 0.18);
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .restore-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-align: center;
    }

    .backup-message {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      min-height: 1.35em;
    }

    .inline-time-modal[hidden] {
      display: none;
    }

    .inline-time-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      width: 100%;
      max-width: 100%;
      padding: 16px;
    }

    .inline-time-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(55, 43, 36, 0.36);
    }

    .inline-time-modal-card {
      position: relative;
      z-index: 1;
      width: min(420px, calc(100vw - 32px));
      max-width: 100%;
      padding: 20px;
      border-radius: 22px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(70, 51, 37, 0.2);
    }

    .inline-time-modal-description {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .inline-time-select-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin: 12px 0 18px;
      max-width: 100%;
      min-width: 0;
    }

    .inline-time-select-row select {
      min-height: 54px;
      font-size: 1.05rem;
      font-weight: 800;
      text-align: center;
    }

    .inline-time-separator {
      color: var(--muted);
      font-weight: 800;
      font-size: 1.2rem;
    }

    .error {
      color: var(--warn);
      font-weight: 700;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      body {
        font-size: 16px;
      }

      .app {
        padding: 22px 12px 48px;
      }

      .panel,
      .record-card {
        border-radius: 16px;
        padding: 15px;
      }
    }

    @media (max-width: 520px) {
      .app {
        width: 100%;
        max-width: 100%;
        padding-left: 10px;
        padding-right: 10px;
      }

      .time-row {
        grid-template-columns: 1fr;
      }

      .time-row input,
      .time-row button {
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }

      .panel,
      .form-card,
      .record-card,
      .card {
        padding-left: 12px;
        padding-right: 12px;
      }

      .quick-button {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .form-actions,
      .card-actions {
        flex-wrap: wrap;
      }

      .form-actions button,
      .card-actions button {
        flex: 1 1 120px;
      }

      .detail-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 360px) {
      .category-grid,
      .category-buttons,
      .later-times-body {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>服薬メモ</h1>
      <p class="lead">効果を確認したい薬だけ記録できます。</p>
      <p class="note">※このアプリは記録用です。服薬内容の変更は主治医・薬剤師に相談してください。</p>
    </header>

    <button class="main-action" id="openFormButton" type="button">＋ 服薬を記録する</button>

    <section class="panel form-card" id="formPanel" aria-live="polite">
      <h2 id="formTitle">服薬を記録する</h2>
      <form id="recordForm">
        <input type="hidden" id="editingId">

        <div class="form-grid">
          <div class="field">
            <label for="dateInput">日付</label>
            <div class="input-wrap">
              <input class="date-input" type="date" id="dateInput" required>
            </div>
          </div>

          <div class="field">
            <span class="field-title">薬の種類</span>
            <div class="category-grid category-buttons" id="categoryButtons"></div>
            <input type="hidden" id="categoryInput">
          </div>

          <div class="field">
            <label for="medicineNameInput">薬名の記入（任意）</label>
            <input type="text" id="medicineNameInput">
          </div>

          <div class="field">
            <label for="medicineAmountInput">量（任意）</label>
            <select id="medicineAmountInput">
              <option value="">なし</option>
              <option value="0.5">0.5錠</option>
              <option value="1">1錠</option>
              <option value="1.5">1.5錠</option>
              <option value="2">2錠</option>
              <option value="2.5">2.5錠</option>
              <option value="3">3錠</option>
              <option value="3.5">3.5錠</option>
              <option value="4">4錠</option>
              <option value="4.5">4.5錠</option>
              <option value="5">5錠</option>
              <option value="5以上">5錠以上</option>
            </select>
          </div>

          <div class="field">
            <label for="takenTimeInput">飲んだ時間</label>
            <div class="time-row">
              <div class="input-wrap">
                <input class="time-input" type="time" id="takenTimeInput">
              </div>
            </div>
          </div>

          <div class="field">
            <label for="beforeMemoInput">服用前の症状・メモ</label>
            <textarea id="beforeMemoInput"></textarea>
          </div>

          <div class="symptom-chip-area" aria-label="服用前の症状">
            <p class="form-symptom-description">ボタンを押すと自動的にメモへ追加されます</p>
            <div class="symptom-chips" id="beforeSymptomChips"></div>
          </div>

          <details class="later-times" id="laterTimesDetails">
            <summary>あとで入力する項目</summary>
            <div class="later-times-body">
              <div class="field">
                <label for="workedTimeInput">効いてきた時間</label>
                <div class="input-wrap">
                  <input class="time-input" type="time" id="workedTimeInput">
                </div>
              </div>

              <div class="field">
                <label for="woreOffTimeInput">効果が切れてきた時間</label>
                <div class="input-wrap">
                  <input class="time-input" type="time" id="woreOffTimeInput">
                </div>
              </div>

              <div class="field">
                <label for="afterMemoInput">服用後の症状・メモ</label>
                <textarea id="afterMemoInput"></textarea>
              </div>

              <div class="symptom-chip-area" aria-label="服用後の症状">
                <p class="form-symptom-description">ボタンを押すと自動的にメモへ追加されます</p>
                <div class="symptom-chips" id="afterSymptomChips"></div>
              </div>
            </div>
          </details>

          <p class="message" id="formMessage" role="alert"></p>

          <div class="form-actions">
            <button class="save-button" type="submit">保存する</button>
            <button class="cancel-button" id="cancelButton" type="button">キャンセル</button>
          </div>
        </div>
      </form>
    </section>

    <section class="backup-card" aria-label="バックアップ">
      <h2 class="backup-title">バックアップ</h2>
      <p class="backup-description">記録を保存したり復元できます。<br>大切な記録がなくならないように、定期的に保存をお願いします。</p>
      <div class="backup-actions">
        <button class="small-button" id="exportButton" type="button">保存</button>
        <label class="small-button restore-button" for="importInput">復元</label>
        <input class="file-input" id="importInput" type="file" accept="application/json,.json">
      </div>
      <p class="backup-message" id="backupMessage" aria-live="polite"></p>
    </section>

    <section class="records-section" aria-labelledby="todayTitle">
      <h2 class="section-title" id="todayTitle">今日の記録</h2>
      <div class="record-list" id="todayRecords"></div>
    </section>

    <section class="records-section" aria-labelledby="pastTitle">
      <h2 class="section-title" id="pastTitle">過去の記録</h2>
      <div class="past-filter-area" aria-label="過去の記録を薬の種類で絞り込む">
        <p class="past-filter-label">薬の種類で見る</p>
        <div class="past-filter-buttons" id="pastFilterButtons"></div>
      </div>
      <div id="pastRecords"></div>
    </section>


  </main>

  <div class="inline-time-modal" id="inlineTimeModal" hidden>
    <div class="inline-time-modal-backdrop" id="inlineTimeModalBackdrop"></div>
    <div class="inline-time-modal-card" role="dialog" aria-modal="true" aria-labelledby="inlineTimeModalTitle">
      <h2 id="inlineTimeModalTitle">効いてきた時間を記録</h2>
      <p class="inline-time-modal-description">必要なら時間を調整して記録できます。</p>
      <div class="inline-time-select-row">
        <select id="inlineHourSelect" aria-label="時"></select>
        <span class="inline-time-separator">:</span>
        <select id="inlineMinuteSelect" aria-label="分"></select>
      </div>
      <div class="inline-time-modal-actions">
        <button class="inline-time-save-button" type="button" id="inlineTimeSaveButton">記録する</button>
        <button class="inline-time-cancel-button" type="button" id="inlineTimeCancelButton">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "fukuyakuMemoRecords";
    const PAST_FILTER_ALL = "すべて";
    const CATEGORIES = ["抗不安薬", "睡眠薬", "抗うつ薬", "抗精神病薬", "気分安定薬", "頓服", "その他"];
    const COMMON_SYMPTOM_GROUPS = [
      ["眠気", "ぼーっとする", "眠れた", "中途覚醒あり"],
      ["不安が下がった", "落ち着かない"],
      ["だるい", "頭が重い", "吐き気", "動悸", "口が渇く", "ふらつき", "強いふらつき"]
    ];
    const BEFORE_SYMPTOM_GROUPS = [
      ["不安", "動悸", "落ち着かない", "吐き気"],
      ["頭が重い", "だるい", "ふらつき", "口が渇く", "眠気", "ぼーっとする"]
    ];
    const AFTER_SYMPTOM_GROUPS = COMMON_SYMPTOM_GROUPS;
    const APP_OPEN_DATE = todayString();

    const openFormButton = document.getElementById("openFormButton");
    const formPanel = document.getElementById("formPanel");
    const formTitle = document.getElementById("formTitle");
    const recordForm = document.getElementById("recordForm");
    const editingId = document.getElementById("editingId");
    const dateInput = document.getElementById("dateInput");
    const categoryButtons = document.getElementById("categoryButtons");
    const categoryInput = document.getElementById("categoryInput");
    const medicineNameInput = document.getElementById("medicineNameInput");
    const medicineAmountInput = document.getElementById("medicineAmountInput");
    const takenTimeInput = document.getElementById("takenTimeInput");
    const workedTimeInput = document.getElementById("workedTimeInput");
    const woreOffTimeInput = document.getElementById("woreOffTimeInput");
    const laterTimesDetails = document.getElementById("laterTimesDetails");
    const beforeMemoInput = document.getElementById("beforeMemoInput");
    const beforeSymptomChips = document.getElementById("beforeSymptomChips");
    const afterMemoInput = document.getElementById("afterMemoInput");
    const afterSymptomChips = document.getElementById("afterSymptomChips");
    const formMessage = document.getElementById("formMessage");
    const cancelButton = document.getElementById("cancelButton");
    const todayRecords = document.getElementById("todayRecords");
    const pastFilterButtons = document.getElementById("pastFilterButtons");
    const pastRecords = document.getElementById("pastRecords");
    const exportButton = document.getElementById("exportButton");
    const importInput = document.getElementById("importInput");
    const backupMessage = document.getElementById("backupMessage");
    const inlineTimeModal = document.getElementById("inlineTimeModal");
    const inlineTimeModalBackdrop = document.getElementById("inlineTimeModalBackdrop");
    const inlineTimeModalTitle = document.getElementById("inlineTimeModalTitle");
    const inlineHourSelect = document.getElementById("inlineHourSelect");
    const inlineMinuteSelect = document.getElementById("inlineMinuteSelect");
    const inlineTimeSaveButton = document.getElementById("inlineTimeSaveButton");
    const inlineTimeCancelButton = document.getElementById("inlineTimeCancelButton");

    let records = loadRecords();
    let selectedPastCategory = PAST_FILTER_ALL;
    let inlineTimeModalState = null;
    let openRecordSymptomDetails = new Set();

    function todayString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function currentTimeString() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function createId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `record-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return [];
        }
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed)
          ? parsed.map(normalizeStoredRecord).filter(Boolean)
          : [];
      } catch (error) {
        return [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function isValidRecordLike(record) {
      return record &&
        typeof record.id === "string" &&
        typeof record.date === "string" &&
        CATEGORIES.includes(record.category) &&
        (typeof record.medicineMemo === "string" || record.medicineMemo == null) &&
        (typeof record.medicineName === "string" || record.medicineName == null) &&
        (typeof record.medicineAmount === "string" || record.medicineAmount == null) &&
        typeof record.takenTime === "string" &&
        (typeof record.workedTime === "string" || record.workedTime == null) &&
        (typeof record.woreOffTime === "string" || record.woreOffTime == null) &&
        (typeof record.symptom === "string" || record.symptom == null) &&
        (typeof record.memo === "string" || record.memo == null) &&
        (typeof record.beforeMemo === "string" || record.beforeMemo == null) &&
        (typeof record.afterMemo === "string" || record.afterMemo == null) &&
        typeof record.createdAt === "string" &&
        typeof record.updatedAt === "string";
    }

    function dizzinessToSymptom(value) {
      if (!value || value === "未記録" || value === "なし") {
        return "";
      }
      if (value === "少し") {
        return "ふらつき少し";
      }
      if (value === "あり") {
        return "ふらつき";
      }
      if (value === "強い") {
        return "強いふらつき";
      }
      return `ふらつき${value}`;
    }

    function mergeSymptomText(baseText, addedText) {
      const parts = [];
      [baseText, addedText].forEach((text) => {
        if (!text) {
          return;
        }
        String(text).split("、").forEach((part) => {
          const trimmed = part.trim();
          if (trimmed && !parts.includes(trimmed)) {
            parts.push(trimmed);
          }
        });
      });
      return parts.join("、");
    }


    function normalizeAmountValue(value) {
      const allowedValues = ["", "0.5", "1", "1.5", "2", "2.5", "3", "3.5", "4", "4.5", "5", "5以上"];
      return allowedValues.includes(value) ? value : "";
    }

    function formatAmount(value) {
      const normalized = normalizeAmountValue(value || "");
      if (!normalized) {
        return "";
      }
      if (normalized === "5以上") {
        return "5錠以上";
      }
      return `${normalized}錠`;
    }

    function hasNewMedicineInfo(record) {
      return Boolean((record.medicineName || "").trim() || normalizeAmountValue(record.medicineAmount || ""));
    }

    function renderMedicineInfo(record) {
      const medicineName = (record.medicineName || "").trim();
      const medicineAmount = formatAmount(record.medicineAmount || "");

      if (medicineName || medicineAmount) {
        const nameHtml = medicineName
          ? `<p class="medicine-memo">薬名：${escapeHtml(medicineName)}</p>`
          : "";
        const amountHtml = medicineAmount
          ? `<p class="medicine-memo">量：${escapeHtml(medicineAmount)}</p>`
          : "";
        return `<div class="medicine-info">${nameHtml}${amountHtml}</div>`;
      }

      const legacyMemo = (record.medicineMemo || "").trim();
      return legacyMemo
        ? `<p class="medicine-memo">薬名・量など：${escapeHtml(legacyMemo)}</p>`
        : "";
    }

    function hasSplitMemo(record) {
      return Boolean((record.beforeMemo || "").trim() || (record.afterMemo || "").trim());
    }

    function legacyMemoText(record) {
      return mergeSymptomText(record.symptom || "", record.memo || "");
    }

    function renderMemoBlocks(record) {
      const beforeMemo = (record.beforeMemo || "").trim();
      const afterMemo = (record.afterMemo || "").trim();

      if (beforeMemo || afterMemo) {
        const beforeHtml = beforeMemo
          ? `<div class="memo-block"><span class="symptom-label">服用前</span>${escapeHtml(beforeMemo)}</div>`
          : "";
        const afterHtml = afterMemo
          ? `<div class="memo-block"><span class="symptom-label">服用後</span>${escapeHtml(afterMemo)}</div>`
          : "";
        return `<div class="memo-blocks">${beforeHtml}${afterHtml}</div>`;
      }

      const legacyMemo = legacyMemoText(record).trim();
      return legacyMemo
        ? `<div class="symptom-box"><span class="symptom-label">メモ</span>${escapeHtml(legacyMemo)}</div>`
        : "";
    }
    function normalizeStoredRecord(record) {
      if (!isValidRecordLike(record)) {
        return null;
      }

      const migratedSymptom = mergeSymptomText(legacyMemoText(record), dizzinessToSymptom(record.dizziness));

      return {
        id: record.id,
        date: record.date,
        category: record.category,
        medicineMemo: record.medicineMemo || "",
        medicineName: record.medicineName || "",
        medicineAmount: normalizeAmountValue(record.medicineAmount || ""),
        takenTime: record.takenTime || "",
        workedTime: record.workedTime || "",
        woreOffTime: record.woreOffTime || "",
        symptom: migratedSymptom,
        memo: record.memo || "",
        beforeMemo: record.beforeMemo || "",
        afterMemo: record.afterMemo || "",
        createdAt: record.createdAt,
        updatedAt: record.updatedAt
      };
    }

    function normalizeImportedRecords(value) {
      if (!Array.isArray(value)) {
        throw new Error("JSONの中身が記録の配列ではありません。");
      }

      return value.map((record) => {
        const normalized = {
          id: typeof record.id === "string" && record.id ? record.id : createId(),
          date: typeof record.date === "string" ? record.date : "",
          category: typeof record.category === "string" ? record.category : "",
          medicineMemo: typeof record.medicineMemo === "string" ? record.medicineMemo : "",
          medicineName: typeof record.medicineName === "string" ? record.medicineName : "",
          medicineAmount: normalizeAmountValue(typeof record.medicineAmount === "string" ? record.medicineAmount : ""),
          takenTime: typeof record.takenTime === "string" ? record.takenTime : "",
          workedTime: typeof record.workedTime === "string" ? record.workedTime : "",
          woreOffTime: typeof record.woreOffTime === "string" ? record.woreOffTime : "",
          symptom: mergeSymptomText(
            mergeSymptomText(typeof record.symptom === "string" ? record.symptom : "", typeof record.memo === "string" ? record.memo : ""),
            dizzinessToSymptom(record.dizziness)
          ),
          memo: typeof record.memo === "string" ? record.memo : "",
          beforeMemo: typeof record.beforeMemo === "string" ? record.beforeMemo : "",
          afterMemo: typeof record.afterMemo === "string" ? record.afterMemo : "",
          createdAt: typeof record.createdAt === "string" ? record.createdAt : new Date().toISOString(),
          updatedAt: typeof record.updatedAt === "string" ? record.updatedAt : new Date().toISOString()
        };

        if (!normalized.date || !CATEGORIES.includes(normalized.category)) {
          throw new Error("日付または薬の種類が不正な記録があります。");
        }

        return normalized;
      });
    }

    function renderCategoryButtons(selectedCategory = "") {
      categoryButtons.innerHTML = CATEGORIES.map((category) => {
        const selectedClass = category === selectedCategory ? " selected" : "";
        const pressed = category === selectedCategory ? "true" : "false";
        return `<button class="category-button category-btn${selectedClass}" type="button" data-category="${category}" aria-pressed="${pressed}">${category}</button>`;
      }).join("");
    }

    function renderPastFilterButtons() {
      const filterOptions = [PAST_FILTER_ALL, ...CATEGORIES];
      pastFilterButtons.innerHTML = filterOptions.map((category) => {
        const selectedClass = category === selectedPastCategory ? " selected" : "";
        const pressed = category === selectedPastCategory ? "true" : "false";
        return `<button class="past-filter-button${selectedClass}" type="button" data-past-category="${escapeHtml(category)}" aria-pressed="${pressed}">${escapeHtml(category)}</button>`;
      }).join("");
    }

    function renderSymptomChipGroups(groups) {
      return groups.map((group) => {
        const buttons = group.map((symptom) => {
          return `<button class="symptom-chip" type="button" data-symptom="${escapeHtml(symptom)}">${escapeHtml(symptom)}</button>`;
        }).join("");
        return `<div class="symptom-chip-row symptom-buttons">${buttons}</div>`;
      }).join("");
    }

    function renderSymptomChips() {
      beforeSymptomChips.innerHTML = renderSymptomChipGroups(BEFORE_SYMPTOM_GROUPS);
      afterSymptomChips.innerHTML = renderSymptomChipGroups(AFTER_SYMPTOM_GROUPS);
    }

    function renderRecordSymptomChips(recordId) {
      return COMMON_SYMPTOM_GROUPS.map((group) => {
        const buttons = group.map((symptom) => {
          return `<button class="symptom-chip record-symptom-chip" type="button" data-action="add-symptom" data-id="${escapeHtml(recordId)}" data-symptom="${escapeHtml(symptom)}">${escapeHtml(symptom)}</button>`;
        }).join("");
        return `<div class="symptom-chip-row symptom-buttons">${buttons}</div>`;
      }).join("");
    }

    function addSymptomToMemo(input, symptom) {
      const currentText = input.value.trim();
      const parts = currentText
        ? currentText.split("、").map((part) => part.trim()).filter(Boolean)
        : [];

      if (!parts.includes(symptom)) {
        parts.push(symptom);
      }

      input.value = parts.join("、");
      input.focus();
    }

    function selectCategory(category) {
      categoryInput.value = category;
      renderCategoryButtons(category);
      formMessage.textContent = "";
    }

    function resetForm() {
      editingId.value = "";
      formTitle.textContent = "服薬を記録する";
      dateInput.value = APP_OPEN_DATE;
      categoryInput.value = "";
      medicineNameInput.value = "";
      medicineAmountInput.value = "";
      takenTimeInput.value = "";
      workedTimeInput.value = "";
      woreOffTimeInput.value = "";
      laterTimesDetails.open = false;
      beforeMemoInput.value = "";
      afterMemoInput.value = "";
      formMessage.textContent = "";
      renderCategoryButtons("");
    }

    function openForm(mode = "new", record = null) {
      formPanel.classList.add("open");

      if (mode === "edit" && record) {
        editingId.value = record.id;
        formTitle.textContent = "記録を編集する";
        dateInput.value = record.date;
        categoryInput.value = record.category;
        medicineNameInput.value = record.medicineName || record.medicineMemo || "";
        medicineAmountInput.value = normalizeAmountValue(record.medicineAmount || "");
        takenTimeInput.value = record.takenTime;
        workedTimeInput.value = record.workedTime;
        woreOffTimeInput.value = record.woreOffTime;
        laterTimesDetails.open = hasTime(record.workedTime) || hasTime(record.woreOffTime) || Boolean((record.afterMemo || "").trim());
        beforeMemoInput.value = record.beforeMemo || legacyMemoText(record);
        afterMemoInput.value = record.afterMemo || "";
        formMessage.textContent = "";
        renderCategoryButtons(record.category);
      } else {
        resetForm();
      }

      formPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => dateInput.focus(), 150);
    }

    function closeForm() {
      formPanel.classList.remove("open");
      resetForm();
    }

    function formatDate(dateString) {
      if (!dateString) {
        return "日付未記録";
      }
      const parts = dateString.split("-");
      if (parts.length !== 3) {
        return dateString;
      }
      const year = Number(parts[0]);
      const month = Number(parts[1]);
      const day = Number(parts[2]);
      return `${year}年${month}月${day}日`;
    }

    function displayTime(value) {
      return value || "未記録";
    }

    function hasTime(value) {
      return typeof value === "string" && value.trim() !== "";
    }

    function sortedRecords(list) {
      return [...list].sort((a, b) => {
        if (a.date !== b.date) {
          return b.date.localeCompare(a.date);
        }
        const aTime = a.takenTime || "00:00";
        const bTime = b.takenTime || "00:00";
        if (aTime !== bTime) {
          return bTime.localeCompare(aTime);
        }
        return b.updatedAt.localeCompare(a.updatedAt);
      });
    }

    function renderRecordCard(record) {
      const memoHtml = renderMedicineInfo(record);
      const symptomHtml = renderMemoBlocks(record);
      const workedValueHtml = hasTime(record.workedTime)
        ? `<span class="detail-value">${escapeHtml(displayTime(record.workedTime))}</span>`
        : `<button class="detail-value record-time-button" type="button" data-action="open-inline-time-modal" data-id="${escapeHtml(record.id)}" data-field="workedTime">記録する</button>`;
      const woreOffValueHtml = hasTime(record.woreOffTime)
        ? `<span class="detail-value">${escapeHtml(displayTime(record.woreOffTime))}</span>`
        : `<button class="detail-value record-time-button" type="button" data-action="open-inline-time-modal" data-id="${escapeHtml(record.id)}" data-field="woreOffTime">記録する</button>`;
      const recordSymptomHtml = `
        <details class="record-symptom-details" data-record-id="${escapeHtml(record.id)}" ${openRecordSymptomDetails.has(record.id) ? "open" : ""}>
          <summary>服用後の症状を追加</summary>
          <div class="symptom-chip-area record-symptom-area" aria-label="服用後の症状">
            <p class="record-symptom-description">ボタンを押すと自動的に服用後メモへ追加されます</p>
            <div class="symptom-chips">${renderRecordSymptomChips(record.id)}</div>
          </div>
        </details>
      `;

      return `
        <article class="record-card card">
          <div class="record-top">
            <div class="record-title-row">
              <p class="date-text">${escapeHtml(formatDate(record.date))}</p>
              <h3 class="category-name" aria-label="薬の種類">${escapeHtml(record.category)}</h3>
            </div>
          </div>
          ${memoHtml}
          <div class="detail-grid">
            <div class="detail">
              <span class="detail-label">飲んだ</span>
              <span class="detail-value">${escapeHtml(displayTime(record.takenTime))}</span>
            </div>
            <div class="detail">
              <span class="detail-label">効いてきた</span>
              ${workedValueHtml}
            </div>
            <div class="detail">
              <span class="detail-label">切れてきた</span>
              ${woreOffValueHtml}
            </div>
          </div>
          ${symptomHtml}
          ${recordSymptomHtml}
          <div class="card-actions">
            <button class="edit-button" type="button" data-action="edit" data-id="${escapeHtml(record.id)}">編集</button>
            <button class="delete-button" type="button" data-action="delete" data-id="${escapeHtml(record.id)}">削除</button>
          </div>
        </article>
      `;
    }

    function renderRecords() {
      const today = todayString();
      const todayList = sortedRecords(records.filter((record) => record.date === today));
      const allPastList = sortedRecords(records.filter((record) => record.date !== today));
      const filteredPastList = selectedPastCategory === PAST_FILTER_ALL
        ? allPastList
        : allPastList.filter((record) => record.category === selectedPastCategory);

      todayRecords.innerHTML = todayList.length
        ? todayList.map(renderRecordCard).join("")
        : `<p class="empty">今日の記録はまだありません。</p>`;

      renderPastFilterButtons();

      if (!allPastList.length) {
        pastRecords.innerHTML = `<p class="empty">過去の記録はまだありません。</p>`;
        return;
      }

      if (!filteredPastList.length) {
        pastRecords.innerHTML = `<p class="empty">この薬の過去の記録はまだありません。</p>`;
        return;
      }

      pastRecords.innerHTML = `<div class="record-list">${filteredPastList.map(renderRecordCard).join("")}</div>`;
    }

    function handleSubmit(event) {
      event.preventDefault();

      if (!categoryInput.value) {
        formMessage.textContent = "薬の種類を選んでください";
        return;
      }

      const now = new Date().toISOString();
      const currentId = editingId.value;
      const existingRecord = records.find((record) => record.id === currentId);

      const savedRecord = {
        id: currentId || createId(),
        date: dateInput.value || todayString(),
        category: categoryInput.value,
        medicineMemo: existingRecord && !hasNewMedicineInfo(existingRecord) ? medicineNameInput.value.trim() : (existingRecord ? existingRecord.medicineMemo || "" : ""),
        medicineName: medicineNameInput.value.trim(),
        medicineAmount: normalizeAmountValue(medicineAmountInput.value),
        takenTime: takenTimeInput.value,
        workedTime: workedTimeInput.value,
        woreOffTime: woreOffTimeInput.value,
        symptom: existingRecord && !hasSplitMemo(existingRecord) ? beforeMemoInput.value.trim() : (existingRecord ? existingRecord.symptom || "" : ""),
        memo: existingRecord ? existingRecord.memo || "" : "",
        beforeMemo: beforeMemoInput.value.trim(),
        afterMemo: afterMemoInput.value.trim(),
        createdAt: existingRecord ? existingRecord.createdAt : now,
        updatedAt: now
      };

      if (currentId) {
        records = records.map((record) => record.id === currentId ? savedRecord : record);
      } else {
        records.push(savedRecord);
      }

      saveRecords();
      renderRecords();
      closeForm();
    }

    function renderInlineTimeOptions() {
      inlineHourSelect.innerHTML = Array.from({ length: 24 }, (_, hour) => {
        const value = String(hour).padStart(2, "0");
        return `<option value="${value}">${value}</option>`;
      }).join("");

      inlineMinuteSelect.innerHTML = Array.from({ length: 60 }, (_, minute) => {
        const value = String(minute).padStart(2, "0");
        return `<option value="${value}">${value}</option>`;
      }).join("");
    }

    function openInlineTimeModal(recordId, timeField) {
      if (!recordId || !["workedTime", "woreOffTime"].includes(timeField)) {
        return;
      }

      const [hour, minute] = currentTimeString().split(":");
      inlineTimeModalState = { recordId, timeField };
      inlineTimeModalTitle.textContent = timeField === "workedTime"
        ? "効いてきた時間を記録"
        : "切れてきた時間を記録";
      inlineHourSelect.value = hour;
      inlineMinuteSelect.value = minute;
      inlineTimeModal.hidden = false;
      document.body.classList.add("modal-open");
      window.setTimeout(() => inlineHourSelect.focus(), 0);
    }

    function closeInlineTimeModal() {
      inlineTimeModalState = null;
      inlineTimeModal.hidden = true;
      document.body.classList.remove("modal-open");
    }

    function saveInlineTimeFromModal() {
      if (!inlineTimeModalState) {
        return;
      }

      const hour = inlineHourSelect.value;
      const minute = inlineMinuteSelect.value;
      const timeField = inlineTimeModalState.timeField;

      if (!hour || !minute || !["workedTime", "woreOffTime"].includes(timeField)) {
        return;
      }

      const targetRecord = records.find((record) => record.id === inlineTimeModalState.recordId);
      if (!targetRecord) {
        return;
      }

      targetRecord[timeField] = `${hour}:${minute}`;
      targetRecord.updatedAt = new Date().toISOString();
      saveRecords();
      closeInlineTimeModal();
      renderRecords();
    }

    function handleRecordAction(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) {
        return;
      }

      const id = button.dataset.id;
      const action = button.dataset.action;
      const record = records.find((item) => item.id === id);

      if (!record) {
        return;
      }

      if (action === "edit") {
        openForm("edit", record);
      }

      if (action === "open-inline-time-modal") {
        openInlineTimeModal(id, button.dataset.field);
      }

      if (action === "add-symptom") {
        const symptom = button.dataset.symptom || "";
        openRecordSymptomDetails.add(id);
        records = records.map((item) => item.id === id
          ? {
              ...item,
              beforeMemo: hasSplitMemo(item) ? item.beforeMemo || "" : legacyMemoText(item),
              afterMemo: mergeSymptomText(item.afterMemo || "", symptom),
              updatedAt: new Date().toISOString()
            }
          : item
        );
        saveRecords();
        renderRecords();
      }

      if (action === "delete") {
        const confirmed = confirm("この記録を削除しますか？");
        if (!confirmed) {
          return;
        }
        records = records.filter((item) => item.id !== id);
        openRecordSymptomDetails.delete(id);
        saveRecords();
        renderRecords();
      }
    }


    function handleRecordSymptomToggle(event) {
      const details = event.target.closest ? event.target.closest(".record-symptom-details") : null;
      if (!details || event.target !== details) {
        return;
      }
      const recordId = details.dataset.recordId;
      if (!recordId) {
        return;
      }
      if (details.open) {
        openRecordSymptomDetails.add(recordId);
      } else {
        openRecordSymptomDetails.delete(recordId);
      }
    }
    function exportJson() {
      const data = JSON.stringify(records, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `服薬メモ_backup_${todayString()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      backupMessage.textContent = "データを保存しました。";
      backupMessage.classList.remove("error");
    }

    function importJson(file) {
      if (!file) {
        return;
      }

      const confirmed = confirm("現在の記録を、選択したファイルの内容で復元します。実行しますか？");
      if (!confirmed) {
        importInput.value = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          records = normalizeImportedRecords(parsed);
          saveRecords();
          renderRecords();
          closeForm();
          backupMessage.textContent = "データを復元しました。";
          backupMessage.classList.remove("error");
        } catch (error) {
          backupMessage.textContent = `復元できませんでした。${error.message}`;
          backupMessage.classList.add("error");
        } finally {
          importInput.value = "";
        }
      };

      reader.onerror = () => {
        backupMessage.textContent = "ファイルを読み込めませんでした。";
        backupMessage.classList.add("error");
        importInput.value = "";
      };

      reader.readAsText(file);
    }

    categoryButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-category]");
      if (button) {
        selectCategory(button.dataset.category);
      }
    });

    beforeSymptomChips.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-symptom]");
      if (button) {
        addSymptomToMemo(beforeMemoInput, button.dataset.symptom);
      }
    });

    afterSymptomChips.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-symptom]");
      if (button) {
        addSymptomToMemo(afterMemoInput, button.dataset.symptom);
      }
    });

    pastFilterButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-past-category]");
      if (!button) {
        return;
      }
      selectedPastCategory = button.dataset.pastCategory;
      renderRecords();
    });

    function fillTimeIfEmpty(input) {
      if (!input.value) {
        input.value = currentTimeString();
      }
    }

    [takenTimeInput, workedTimeInput, woreOffTimeInput].forEach((input) => {
      input.addEventListener("focus", () => fillTimeIfEmpty(input));
      input.addEventListener("click", () => fillTimeIfEmpty(input));
    });

    openFormButton.addEventListener("click", () => openForm("new"));
    cancelButton.addEventListener("click", closeForm);
    recordForm.addEventListener("submit", handleSubmit);
    todayRecords.addEventListener("click", handleRecordAction);
    pastRecords.addEventListener("click", handleRecordAction);
    todayRecords.addEventListener("toggle", handleRecordSymptomToggle, true);
    pastRecords.addEventListener("toggle", handleRecordSymptomToggle, true);
    inlineTimeSaveButton.addEventListener("click", saveInlineTimeFromModal);
    inlineTimeCancelButton.addEventListener("click", closeInlineTimeModal);
    inlineTimeModalBackdrop.addEventListener("click", closeInlineTimeModal);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !inlineTimeModal.hidden) {
        closeInlineTimeModal();
      }
    });
    exportButton.addEventListener("click", exportJson);
    importInput.addEventListener("change", () => importJson(importInput.files[0]));

    renderCategoryButtons("");
    renderPastFilterButtons();
    renderInlineTimeOptions();
    renderSymptomChips();
    resetForm();
    renderRecords();

    if ("serviceWorker" in navigator) {
      let refreshing = false;

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) {
          return;
        }
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then((registration) => {
            registration.update();
          })
          .catch((error) => {
            console.warn("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
